services:
  - type: web
    name: notebook-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: FLASK_DEBUG
        value: "false"
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
